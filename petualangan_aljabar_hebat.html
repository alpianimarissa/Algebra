    <script>
        // --- 1. SOUND GENERATION SYSTEM (WEB AUDIO API) ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); // G5
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); // C6
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.03, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio synthesized successfully.");
            }
        }

                            <p class="text-xs text-gray-600 mt-1">Sebuah kue ulang tahun dipotong menjadi $s$ bagian yang sama besar. Jika 4 anak masing-masing memakan 2 bagian dan tidak ada kue yang tersisa, menjadi berapa bagian kue tersebut dipotong pada awalnya?</p>
                        </div>
                        <div class="flex justify-center gap-2">
                            <button onclick="checkSlideAnswer(this, false, 'Pikirkan: 4 anak × 2 bagian masing-masing!', 10)" class="bg-white px-5 py-2.5 rounded-xl border font-bold text-xs">6 bagian</button>
                            <button onclick="checkSlideAnswer(this, true, 'Luar biasa! $s / 4 = 2$ berarti $s = 8$ bagian secara keseluruhan!', 15)" class="bg-white px-5 py-2.5 rounded-xl border font-bold text-xs">8 bagian</button>
                        </div>
                    </div>
                `
            },
            // Slide 29: Word Problem 4
            {
                section: "Soal Cerita",
                title: "Tanaman yang Tumbuh",
                subtitle: "Situasi dunia nyata 4",
                icon: "🌱",
                render: () => `
                    <div class="space-y-4 max-w-xl mx-auto">
                        <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl">
                            <p class="text-sm font-bold text-amber-950">Tinggi Tanaman:</p>
                            <p class="text-xs text-gray-600 mt-1">Sebuah tanaman bunga matahari tumbuh 3 sentimeter setiap minggu. Tinggi awalnya adalah 10 cm. Tingginya setelah $w$ minggu adalah $10 + 3w$. Berapa tinggi bunga matahari setelah 4 minggu?</p>
                        </div>
                        <div class="flex justify-center gap-2">
                            <button onclick="checkSlideAnswer(this, true, 'Hebat! $10 + 3 \\times 4 = 10 + 12 = 22$ cm!', 15)" class="bg-white px-5 py-2.5 rounded-xl border font-bold text-xs">22 cm</button>
                            <button onclick="checkSlideAnswer(this, false, 'Ingat untuk mengalikan 3 dengan 4 minggu terlebih dahulu!', 10)" class="bg-white px-5 py-2.5 rounded-xl border font-bold text-xs">13 cm</button>
                        </div>
                    </div>
                `
            },
            // Slide 30: Reflection & Learner Profile
            {
                section: "Refleksi & Kesimpulan",
                title: "Merefleksikan Perjalanan Kita",
                subtitle: "Tinjauan Profil Pelajar IB (IB Learner Profile)",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto space-y-4">
                        <p class="text-sm font-bold text-gray-600">Profil Pelajar IB mana yang paling banyak kamu gunakan hari ini?</p>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="handleEmotionSelect(this, 'thinker')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-3 rounded-2xl flex flex-col items-center active:scale-95 transition">
                                <span class="text-3xl mb-1">🤔</span>
                                <span class="text-[10px] font-bold text-gray-600">Pemikir (Thinker)</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'inquirer')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-3 rounded-2xl flex flex-col items-center active:scale-95 transition">
                                <span class="text-3xl mb-1">🔍</span>
                                <span class="text-[10px] font-bold text-gray-600">Penyelidik (Inquirer)</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'reflective')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-3 rounded-2xl flex flex-col items-center active:scale-95 transition">
                                <span class="text-3xl mb-1">🌱</span>
                                <span class="text-[10px] font-bold text-gray-600">Reflektif (Reflective)</span>
                            </button>
                        </div>
                        <p id="reflection-text" class="text-xs font-bold text-[#FF8C00] min-h-[16px]"></p>
                    </div>
                `
            }
        ];

        // --- 3. SYSTEM STATE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad Context
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. SYSTEM RUN ON LOAD ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- 5. RENDER SYSTEM WITH MATHJAX SUPPORT ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#FF8C00] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="kids-heading text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress tracking
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer info
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Tahap Unit: ${slide.section}`;

            // Arrow states
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // Trigger simulator slide functions
            if (currentSlide === 14) { 
                setTimeout(updateScales, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 6. USER INTERACTION & VALIDATION ---
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#4CAF50]");
                score += points;
                document.getElementById('xp-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, profile) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#FF8C00]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#FF8C00]', 'scale-105');
            
            const feedbackText = document.getElementById('reflection-text');
            if (profile === 'thinker') {
                feedbackText.innerText = "Luar biasa! Kamu menggunakan logika untuk menyeimbangkan timbangan dan mencari tahu nilai yang tidak diketahui! 💭";
                playSound('correct');
                triggerConfetti();
            } else if (profile === 'inquirer') {
                feedbackText.innerText = "Hebat! Kamu menyelidiki bagaimana balok visual dan angka tumbuh langkah demi langkah! 🔍";
                playSound('correct');
                triggerConfetti();
            } else {
                feedbackText.innerText = "Tepat sekali! Kamu merefleksikan kesalahanmu dan bekerja mundur untuk mendapatkan jawabannya! 🌱";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerText = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // --- 7. DYNAMIC SCALES SIMULATOR (SLIDE 15) ---
        function updateScales() {
            const leftVal = parseInt(document.getElementById('scale-l-slider').value);
            const rightVal = parseInt(document.getElementById('scale-r-slider').value);

            document.getElementById('scale-l-val').innerText = leftVal;
            document.getElementById('scale-r-val').innerText = rightVal;

            const beam = document.getElementById('scale-beam');
            const plateL = document.getElementById('scale-plate-l');
            const plateY = document.getElementById('scale-plate-r');
            const statusText = document.getElementById('scale-status');

            // Calculate rotation angle based on weight difference
            let angle = (leftVal - rightVal) * 3; 
            if (angle > 15) angle = 15;
            if (angle < -15) angle = -15;

            // Apply SVG transforms for visual tilt
            beam.setAttribute('transform', `rotate(${angle}, 50, 55)`);

            // Reposition the hanging weight plates
            const rad = angle * Math.PI / 180;
            const leftX = 50 - 35 * Math.cos(rad);
            const leftY = 55 - 35 * Math.sin(rad);
            const rightX = 50 + 35 * Math.cos(rad);
            const rightY = 55 + 35 * Math.sin(rad);

            document.getElementById('scale-plate-l').setAttribute('cx', leftX);
            document.getElementById('scale-plate-l').setAttribute('cy', leftY);
            document.getElementById('scale-plate-r').setAttribute('cx', rightX);
            document.getElementById('scale-plate-r').setAttribute('cy', rightY);

            // Update status text feedback
            if (leftVal === rightVal) {
                statusText.innerText = "Seimbang Sempurna! 🎉";
                statusText.className = "font-bold text-emerald-600 block";
            } else if (leftVal > rightVal) {
                statusText.innerText = "Sisi kiri lebih berat! ⚖️";
                statusText.className = "font-bold text-pink-600 block";
            } else {
                statusText.innerText = "Sisi kanan lebih berat! ⚖️";
                statusText.className = "font-bold text-blue-600 block";
            }
        }

        // --- 8. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        // Drawing in sketchpad
        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            // Touch support for portable learning devices
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#00838F'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 9. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- 10. CONFETTI CELEBRATION EFFECTS ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
</html>
